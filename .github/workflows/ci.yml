name: CI

on:
  # branches: ['**'] (rather than an unfiltered `push:`) matches any branch
  # push but excludes tag-ref pushes. This matters once gate G9's
  # tag-release-version job (below) starts pushing annotated release tags —
  # an unfiltered push trigger would fire the whole workflow again for that
  # tag push alone. See design.md Decision 4 in
  # openspec/changes/g9-automate-release-tagging (or its archived copy).
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      # -----------------------------------------------------------------
      # Cache: NuGet packages and obj/ directories
      # Key is derived from Directory.Packages.props + all .csproj files
      # -----------------------------------------------------------------
      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props', '**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Cache obj/ directories
        uses: actions/cache@v5
        with:
          path: |
            src/**/obj
            tools/**/obj
            tests/**/obj
          key: obj-${{ runner.os }}-${{ hashFiles('Directory.Packages.props', '**/*.csproj') }}
          restore-keys: obj-${{ runner.os }}-

      # -----------------------------------------------------------------
      # macOS: verify committed dylib is current, then rebuild from source.
      # The staleness check runs BEFORE the rebuild so that a developer who
      # bumps FT8_SHIM_VERSION without refreshing the committed binary gets
      # a hard CI failure — not a silent pass against a freshly-rebuilt copy.
      # -----------------------------------------------------------------
      - name: Check committed macOS dylib is current
        if: runner.os == 'macOS'
        continue-on-error: true
        run: |
          EXPECTED=$(python3 -c "import re; src=open('src/OpenWSFZ.Ft8/Interop/Ft8LibInterop.cs').read(); m=re.search(r'ExpectedShimVersion\s*=\s*(\d+)',src); print(m.group(1))")
          echo "C# ExpectedShimVersion = $EXPECTED"
          python3 tools/check_native_version.py \
            src/OpenWSFZ.Ft8/Native/osx-arm64/libft8.dylib "$EXPECTED"

      - name: Build native macOS dylib (ARM64, Clang)
        if: runner.os == 'macOS'
        run: |
          git clone --depth 1 --branch msvc-compat \
            https://github.com/frank001/ft8_lib.git /tmp/ft8_lib
          cd /tmp/ft8_lib
          # Overlay the repo's patched decode.c (adds ftx_compute_candidate_llr_mean_abs
          # and any future non-static diagnostic probes) before compiling.
          cp "$GITHUB_WORKSPACE/native/ft8_lib_build/patched/ft8/decode.c" ft8/decode.c
          clang -std=c11 -D_GNU_SOURCE -O2 -Wall -fPIC -I. \
            -target arm64-apple-macos11.0 -c \
            ft8/constants.c ft8/crc.c ft8/decode.c ft8/encode.c ft8/ldpc.c \
            ft8/message.c ft8/text.c \
            common/monitor.c \
            fft/kiss_fft.c fft/kiss_fftr.c
          clang -std=c11 -D_GNU_SOURCE -O2 -Wall -fPIC -I. \
            -target arm64-apple-macos11.0 -c \
            "$GITHUB_WORKSPACE/src/OpenWSFZ.Ft8/Native/ft8_shim.c"
          clang -dynamiclib -target arm64-apple-macos11.0 \
            -o libft8.dylib \
            constants.o crc.o decode.o encode.o ldpc.o message.o text.o \
            monitor.o kiss_fft.o kiss_fftr.o ft8_shim.o
          # ld embeds a fresh, randomly-generated LC_UUID on every link (see
          # chore/ci-native-binary-reproducibility, 2026-07-03). Omitting it
          # via -Wl,-no_uuid is NOT viable — dyld refuses to dlopen a Mach-O
          # image with no LC_UUID at all ("missing LC_UUID load command"),
          # which broke every macOS test that P/Invokes this library. Instead,
          # zero the UUID *value* in place (the load command itself stays
          # present, satisfying dyld) and re-sign, which is deterministic for
          # identical input since ad-hoc signing contacts no timestamp
          # authority. See tools/zero_dylib_uuid.py for the full rationale.
          python3 "$GITHUB_WORKSPACE/tools/zero_dylib_uuid.py" libft8.dylib
          echo "=== macOS dylib exports ==="
          nm -gU libft8.dylib | grep "ft8_"
          cp libft8.dylib \
            "$GITHUB_WORKSPACE/src/OpenWSFZ.Ft8/Native/osx-arm64/libft8.dylib"

      # -----------------------------------------------------------------
      # Regression guard for the commit-native-binaries churn fixed in
      # chore/ci-native-binary-reproducibility (2026-07-03): this proves the
      # link + UUID-zeroing + re-sign pipeline above is actually
      # deterministic by relinking the same object files a second time and
      # diffing the output, so a future regression fails CI immediately
      # instead of resurfacing as PR churn days later (see PR #23 and four
      # earlier no-op merges under the label "shim 20260030").
      # -----------------------------------------------------------------
      - name: Verify deterministic macOS link
        if: runner.os == 'macOS'
        run: |
          # Relink from a SEPARATE directory but with the exact same relative
          # -o argument ("libft8.dylib"), so the embedded LC_ID_DYLIB string
          # (ld embeds the literal -o argument verbatim, not a resolved
          # absolute path) matches the original build byte-for-byte. Using a
          # different path string here (e.g. an absolute path to a sibling
          # dir) changes LC_ID_DYLIB's cmdsize and cascades into every
          # subsequent section offset — a false positive from two earlier
          # versions of this check, not real link non-determinism.
          mkdir -p /tmp/ft8_lib_relink_check
          cp /tmp/ft8_lib/*.o /tmp/ft8_lib_relink_check/
          cd /tmp/ft8_lib_relink_check
          clang -dynamiclib -target arm64-apple-macos11.0 \
            -o libft8.dylib \
            constants.o crc.o decode.o encode.o ldpc.o message.o text.o \
            monitor.o kiss_fft.o kiss_fftr.o ft8_shim.o
          python3 "$GITHUB_WORKSPACE/tools/zero_dylib_uuid.py" libft8.dylib
          if ! cmp -s /tmp/ft8_lib/libft8.dylib libft8.dylib; then
            echo "=== DIAGNOSTIC: sizes ==="
            ls -la /tmp/ft8_lib/libft8.dylib libft8.dylib
            echo "=== DIAGNOSTIC: full load commands diff ==="
            otool -l /tmp/ft8_lib/libft8.dylib > /tmp/lc1.txt
            otool -l libft8.dylib > /tmp/lc2.txt
            diff -u /tmp/lc1.txt /tmp/lc2.txt || true
            echo "::error::macOS dylib link is non-deterministic — two consecutive links of identical object files, same -o argument, produced different bytes. This will cause spurious commit-native-binaries PRs."
            exit 1
          fi
          echo "macOS link verified deterministic (byte-identical relink)."

      - name: Upload macOS dylib artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: libft8-dylib-osx-arm64
          path: src/OpenWSFZ.Ft8/Native/osx-arm64/libft8.dylib
          if-no-files-found: error

      # -----------------------------------------------------------------
      # Linux: verify committed .so is current, then rebuild from source.
      # Mirrors the macOS staleness check above.
      # -----------------------------------------------------------------
      - name: Check committed Linux .so is current
        if: runner.os == 'Linux'
        continue-on-error: true
        run: |
          EXPECTED=$(python3 -c "import re; src=open('src/OpenWSFZ.Ft8/Interop/Ft8LibInterop.cs').read(); m=re.search(r'ExpectedShimVersion\s*=\s*(\d+)',src); print(m.group(1))")
          echo "C# ExpectedShimVersion = $EXPECTED"
          python3 tools/check_native_version.py \
            src/OpenWSFZ.Ft8/Native/linux-x64/libft8.so "$EXPECTED"

      - name: Build native Linux .so (x64, GCC)
        if: runner.os == 'Linux'
        run: |
          git clone --depth 1 --branch msvc-compat \
            https://github.com/frank001/ft8_lib.git /tmp/ft8_lib
          cd /tmp/ft8_lib
          # Overlay the repo's patched decode.c (adds ftx_compute_candidate_llr_mean_abs
          # and any future non-static diagnostic probes) before compiling.
          cp "$GITHUB_WORKSPACE/native/ft8_lib_build/patched/ft8/decode.c" ft8/decode.c
          gcc -std=c11 -D_GNU_SOURCE -O2 -Wall -fPIC -I. -c \
            ft8/constants.c ft8/crc.c ft8/decode.c ft8/encode.c ft8/ldpc.c \
            ft8/message.c ft8/text.c \
            common/monitor.c \
            fft/kiss_fft.c fft/kiss_fftr.c
          gcc -std=c11 -D_GNU_SOURCE -O2 -Wall -fPIC -I. -c \
            "$GITHUB_WORKSPACE/src/OpenWSFZ.Ft8/Native/ft8_shim.c"
          gcc -shared -o libft8.so \
            constants.o crc.o decode.o encode.o ldpc.o message.o text.o \
            monitor.o kiss_fft.o kiss_fftr.o ft8_shim.o \
            -lm
          echo "=== Linux .so exports ==="
          nm -D libft8.so | grep "ft8_"
          cp libft8.so \
            "$GITHUB_WORKSPACE/src/OpenWSFZ.Ft8/Native/linux-x64/libft8.so"

      - name: Upload Linux .so artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: libft8-so-linux-x64
          path: src/OpenWSFZ.Ft8/Native/linux-x64/libft8.so
          if-no-files-found: error

      # -----------------------------------------------------------------
      # Gate G1: Build and test on all three operating systems
      # -----------------------------------------------------------------
      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore

      # -----------------------------------------------------------------
      # Self-contained (non-AOT) publish — dev-tasks/2026-07-18-self-contained-
      # non-aot-working-binary.md. Must run BEFORE dotnet test so the E2E
      # tests can find the published binary at the DEFAULT
      # bin/Release/net10.0/<rid>/publish/. OpenWSFZ.Daemon.csproj switches
      # PublishAot on for ANY RID-targeted publish, self-contained or not, but
      # NAudio's [ComImport] WASAPI COM activation is incompatible with Native
      # AOT and crashes real capture hardware on Windows. This step overrides
      # PublishAot at the command line (global properties beat the project
      # file's conditional PropertyGroup) via tools/publish_selfcontained.py
      # — this is the one standalone binary this project actually ships.
      # DaemonE2ETests, BackgroundColdStartE2ETests, and
      # SelfContainedNonAotE2ETests (the last of which also hits the
      # audio-device endpoints to prove the WASAPI COM-activation path
      # doesn't crash) all launch this same binary.
      # -----------------------------------------------------------------
      - name: Self-contained (non-AOT) publish (Daemon)
        run: python3 tools/publish_selfcontained.py --rid ${{ matrix.rid }}

      - name: Upload Linux daemon binary
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: daemon-linux-x64
          path: src/OpenWSFZ.Daemon/bin/Release/net10.0/linux-x64/publish/OpenWSFZ.Daemon
          if-no-files-found: error

      # -----------------------------------------------------------------
      # Native AOT structural prove-out — deliberately secondary. Publishes
      # to a SEPARATE output directory (publish-aot/, never the default
      # publish/ the step above uses) so it can never clobber the working
      # binary. Exercises the AOT toolchain on each OS (build-pipeline spec)
      # and is consumed by nothing else — Windows WASAPI audio is
      # known-broken under it (see dev-tasks/2026-07-18-aot-comwrappers-
      # audio-migration.md, the deferred real fix). Not launched by any E2E
      # test; a compile-check only.
      # -----------------------------------------------------------------
      - name: AOT publish (Daemon)
        run: >
          dotnet publish src/OpenWSFZ.Daemon
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:PublishAot=true
          -o src/OpenWSFZ.Daemon/bin/Release/net10.0/${{ matrix.rid }}/publish-aot/

      # -----------------------------------------------------------------
      # Gate G1: Build-and-test — all matrix legs
      # Gate G6: Decoder-correctness — real-signal fixture integration test
      #          (FR-029 / NFR-016). G6 runs inside the G1 dotnet test step
      #          because the real-signal fixture test lives in
      #          OpenWSFZ.Ft8.Tests. A failing real-signal fixture test
      #          exits non-zero here and blocks merge on all three legs.
      #          The fixture test is expected to be red until the decoder is
      #          fixed in a follow-on change (see RECOVERY_PLAN.md Phase 2).
      # -----------------------------------------------------------------
      - name: Test (Release)
        run: >
          dotnet test -c Release --no-build
          --logger trx
          --collect:"XPlat Code Coverage"
          --results-directory TestResults/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: TestResults/

      # -----------------------------------------------------------------
      # JS unit tests: mirrors the C# `DecodeFilterEvaluatorTests` suite
      # (decode-panel-filtering capability, design.md Decision 2's drift-risk
      # mitigation — "mirrored unit tests on both sides"). Runs once, Linux
      # only, like the other single-run gates below — the suite isn't
      # OS-dependent and GitHub-hosted runners ship Node preinstalled, so no
      # setup-node/npm-install step is needed (web/js/package.json has zero
      # dependencies). Added after discovering the suite had never actually
      # executed in CI (or anywhere) — its own header comment contained a
      # `**/` glob that silently truncated the file's JSDoc block comment,
      # making all 21 tests a parse error rather than a pass.
      # -----------------------------------------------------------------
      - name: JS unit tests (web/js)
        if: runner.os == 'Linux'
        run: node --test web/js/*.test.js

      # =================================================================
      # Linux-only gates (G3, G5, and coverage reporting)
      # =================================================================

      # -----------------------------------------------------------------
      # Gate G3: TraceabilityCheck
      # -----------------------------------------------------------------
      - name: Gate G3 — Traceability check
        if: runner.os == 'Linux'
        run: >
          dotnet run --project tools/TraceabilityCheck -c Release --no-build --
          --requirements REQUIREMENTS.md
          --assemblies $(find . -path "*/bin/Release/net10.0/*.Tests.dll" | tr '\n' ' ')
          --report traceability.md
          --debt-file traceability-debt.md

      - name: Upload traceability report
        if: runner.os == 'Linux' && always()
        uses: actions/upload-artifact@v7
        with:
          name: traceability-report
          path: traceability.md

      # -----------------------------------------------------------------
      # Gate G5: LicenseInventoryCheck
      # -----------------------------------------------------------------
      - name: Gate G5 — Licence inventory check
        if: runner.os == 'Linux'
        run: >
          dotnet run --project tools/LicenseInventoryCheck -c Release --no-build --
          --solution-root .
          --report licence-inventory.md

      - name: Upload licence inventory report
        if: runner.os == 'Linux' && always()
        uses: actions/upload-artifact@v7
        with:
          name: licence-inventory-report
          path: licence-inventory.md

      # -----------------------------------------------------------------
      # Lint: UDP capture margin check
      # Flags a ReceiveAllAsync(listener, N, ...) call in the external-
      # reporting UDP tests that asserts a specific WSJT-X datagram type is
      # present without a comment documenting why N was chosen. Added
      # 2026-07-19 after PR #90 added a Clear datagram send ahead of Close
      # in ExternalReportingService.StopAsync, and a pre-existing test's
      # fixed 3-datagram capture window silently truncated Close off the
      # end on this exact runner (ubuntu-latest) — see PR #91's fix and
      # tools/check_udp_capture_margin.py's own module docstring for the
      # full incident. Pure text scan — runs once (Linux only), same
      # rationale as G3/G5/G8 not being triplicated across the OS matrix.
      # -----------------------------------------------------------------
      - name: Lint — UDP capture margin check
        if: runner.os == 'Linux'
        run: python3 tools/check_udp_capture_margin.py

      # -----------------------------------------------------------------
      # Gate G7: Secrets scan — gitleaks
      # Scans the full commit history for secrets, credentials, private
      # keys, and other sensitive material. Any finding fails the build.
      # Implements: NFR-017 (security — secrets scan gate).
      # -----------------------------------------------------------------
      - name: Gate G7 — Secrets scan (gitleaks)
        if: runner.os == 'Linux'
        run: |
          GITLEAKS_VERSION="8.27.2"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          chmod +x /tmp/gitleaks
          /tmp/gitleaks detect \
            --source . \
            --redact \
            --exit-code 1

      # -----------------------------------------------------------------
      # Gate G8: OpenSpec validation
      # Runs `openspec validate --strict --all` across every spec and active
      # change. Added 2026-07-05 after 24 of 42 specs were found failing
      # strict validation, discovered only by a manual, ad-hoc run during an
      # unrelated change — nothing had ever run this check before, in CI or
      # otherwise. Version pinned (not @latest) so a future openspec release
      # can't silently change gate behaviour without a deliberate version
      # bump reviewed in a PR.
      # -----------------------------------------------------------------
      - name: Gate G8 — OpenSpec validation
        if: runner.os == 'Linux'
        run: npx --yes @fission-ai/openspec@1.3.1 validate --strict --all

      # -----------------------------------------------------------------
      # Coverage reporting (informational only — never fails the workflow)
      # Implements: "Coverage reporting is informational" (ci-quality-gates spec)
      # -----------------------------------------------------------------
      - name: Generate coverage report
        if: runner.os == 'Linux'
        continue-on-error: true
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:"TestResults/**/coverage.cobertura.xml" \
            -targetdir:"coverage-report" \
            -reporttypes:Html

      - name: Upload coverage report
        if: runner.os == 'Linux'
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage-report/

      # -----------------------------------------------------------------
      # Gate G2 (inert placeholder) — Performance gate
      # Becomes a real gate when Phase X lands tests tagged tier=performance.
      # -----------------------------------------------------------------
      - name: Gate G2 — Performance gate (inert until performance tests exist)
        if: runner.os == 'Linux'
        run: |
          # Count tests tagged [Trait("tier", "performance")] — exit 0 when none present.
          # This step becomes a real gate in a later phase.
          echo "Performance gate: no performance tests present — gate passes vacuously."

      # -----------------------------------------------------------------
      # Gate G4 (inert placeholder) — UI-visibility gate
      # Becomes a real gate when Phase X lands tests tagged tier=ui-visibility.
      # -----------------------------------------------------------------
      - name: Gate G4 — UI-visibility gate (inert until UI-visibility tests exist)
        if: runner.os == 'Linux'
        run: |
          # Count tests tagged [Trait("tier", "ui-visibility")] — exit 0 when none present.
          # This step becomes a real gate in a later phase.
          # See UI visibility rule in MEMORY.md: controls only appear once backend is testable.
          echo "UI-visibility gate: no ui-visibility tests present — gate passes vacuously."

  # -----------------------------------------------------------------
  # Commit-back: after the matrix builds fresh Linux and macOS
  # binaries, commit them to the triggering branch so the repo never
  # carries stale binaries.
  #
  # Only runs on direct-push events (not PRs from forks, where write
  # access is unavailable). Skipped when the push was itself made by
  # the GitHub Actions bot (loop guard, `github.actor != 'github-actions[bot]'`
  # below) — that guard alone is sufficient to prevent this job re-triggering
  # itself, so the commit message must NOT carry [skip ci]. That tag
  # suppresses BOTH the push trigger AND the pull_request trigger for the
  # tagged commit, which meant the auto-opened PR's three required status
  # checks never posted and branch protection left it permanently BLOCKED
  # (discovered 2026-07-03, PR #25 — see lesson 25 in
  # project-state-2026-07.md). Do not reintroduce [skip ci] here.
  #
  # Gated on detect-native-changes (below): the macOS build is not
  # byte-reproducible across separate runner instances (lesson 26 —
  # compiler cold-path codegen drifts between runs even with identical
  # source), so rebuilding on *every* push to main would spuriously detect
  # a "diff" and open a cosmetic no-op PR almost every time, regardless of
  # whether anything native-relevant changed (observed 2026-07-03: PRs #26
  # and #28, the latter spawned by an unrelated .gitignore push). Skipping
  # the rebuild entirely when the push touches none of the native-relevant
  # paths eliminates that churn at the source instead of relying on someone
  # to notice and close each spurious PR by hand.
  # -----------------------------------------------------------------
  detect-native-changes:
    name: Detect native-relevant changes
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.actor != 'github-actions[bot]'
    outputs:
      relevant: ${{ steps.check.outputs.relevant }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check whether this push touches native-relevant paths
        id: check
        run: |
          BEFORE="${{ github.event.before }}"
          # First push GitHub ever records for a ref reports an all-zero SHA
          # for "before" — fall back to the immediate parent commit so the
          # diff still has a valid starting point.
          if [ -z "$BEFORE" ] || [[ "$BEFORE" =~ ^0+$ ]]; then
            BEFORE="${{ github.sha }}^"
          fi
          echo "Diffing $BEFORE..${{ github.sha }}"
          CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}")
          echo "Changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(src/OpenWSFZ\.Ft8/Native/|native/ft8_lib_build/|src/OpenWSFZ\.Ft8/Interop/Ft8LibInterop\.cs)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  commit-native-binaries:
    name: Commit rebuilt native binaries
    runs-on: ubuntu-latest
    needs: [build-test, detect-native-changes]
    permissions:
      contents: write
      pull-requests: write
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.actor != 'github-actions[bot]' &&
      needs.detect-native-changes.outputs.relevant == 'true'

    steps:
      - name: Checkout (full depth, with write access)
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Linux .so artifact
        uses: actions/download-artifact@v7
        with:
          name: libft8-so-linux-x64
          path: src/OpenWSFZ.Ft8/Native/linux-x64/

      - name: Download macOS dylib artifact
        uses: actions/download-artifact@v7
        with:
          name: libft8-dylib-osx-arm64
          path: src/OpenWSFZ.Ft8/Native/osx-arm64/

      - name: Check whether binaries changed
        id: diff_check
        run: |
          git diff --exit-code \
            src/OpenWSFZ.Ft8/Native/linux-x64/libft8.so \
            src/OpenWSFZ.Ft8/Native/osx-arm64/libft8.dylib \
          && echo "changed=false" >> "$GITHUB_OUTPUT" \
          || echo "changed=true"  >> "$GITHUB_OUTPUT"

      - name: Verify rebuilt binary versions
        if: steps.diff_check.outputs.changed == 'true'
        run: |
          EXPECTED=$(python3 -c "
          import re
          src = open('src/OpenWSFZ.Ft8/Interop/Ft8LibInterop.cs').read()
          m = re.search(r'ExpectedShimVersion\s*=\s*(\d+)', src)
          print(m.group(1))
          ")
          echo "Expected shim version: $EXPECTED"
          python3 tools/check_native_version.py \
            src/OpenWSFZ.Ft8/Native/linux-x64/libft8.so "$EXPECTED"
          python3 tools/check_native_version.py \
            src/OpenWSFZ.Ft8/Native/osx-arm64/libft8.dylib "$EXPECTED"

      - name: Commit updated binaries to PR branch
        if: steps.diff_check.outputs.changed == 'true'
        id: branch_push
        run: |
          SHIM=$(python3 -c "
          import re
          src = open('src/OpenWSFZ.Ft8/Interop/Ft8LibInterop.cs').read()
          m = re.search(r'ExpectedShimVersion\s*=\s*(\d+)', src)
          print(m.group(1))
          ")
          BRANCH="ci/native-binaries-shim${SHIM}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add \
            src/OpenWSFZ.Ft8/Native/linux-x64/libft8.so \
            src/OpenWSFZ.Ft8/Native/osx-arm64/libft8.dylib
          git commit -m "chore(native): rebuild Linux and macOS binaries to shim ${SHIM}"
          git push --force origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "shim=$SHIM"     >> "$GITHUB_OUTPUT"

      - name: Open PR for updated binaries
        if: steps.diff_check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.branch_push.outputs.branch }}"
          SHIM="${{ steps.branch_push.outputs.shim }}"
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "PR already open for branch $BRANCH — skipping."
            exit 0
          fi
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(native): update Linux/macOS binaries to shim ${SHIM}" \
            --body "Automated PR from the \`commit-native-binaries\` CI job.

          The Linux (\`libft8.so\`) and macOS (\`libft8.dylib\`) native binaries
          were rebuilt from source and differ from the committed versions.
          This PR updates them to shim ${SHIM}.

          **No source changes.** Safe to merge once CI passes on this branch."

  # -----------------------------------------------------------------
  # Gate G9: Version governance
  # Enforces the canonical-version invariant on every PR targeting main:
  #   (a) the version cited in README.md / REQUIREMENTS.md matches VERSION
  #       (tools/check_version_docs.py), and
  #   (b) any PR that first introduces a `**User-facing:** yes` OpenSpec
  #       change's proposal.md into main's history (active or archived path)
  #       also bumps VERSION relative to main (tools/check_version_bump.py).
  #       Enforced pre-merge, at first introduction — not deferred to a later
  #       archiving PR (corrected 2026-07-18 by fix-version-bump-gate-timing;
  #       an ordinary archiving PR that only relocates an already-introduced
  #       change is not re-checked).
  # Implements: ci-quality-gates spec (gate G9), release-versioning capability.
  #
  # Runs only on pull_request events — a direct push has no base ref to diff
  # against, and main is never the base of a diff against itself (see design.md
  # Decision 6). Uses a dedicated fetch-depth: 0 checkout, mirroring the
  # detect-native-changes job, because the default shallow (depth 1) checkout in
  # build-test cannot diff the PR branch against main.
  # -----------------------------------------------------------------
  version-governance:
    name: Gate G9 — Version governance
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: G9a — Doc/VERSION consistency
        run: python3 tools/check_version_docs.py

      - name: G9b — Mandatory bump on user-facing merge
        run: python3 tools/check_version_bump.py "origin/${{ github.base_ref }}"

  # -----------------------------------------------------------------
  # Gate G9 (continued): automated release tagging
  # Closes the gap the original gate G9 left manual: cuts an annotated git
  # tag matching VERSION's content on every push to main, if that tag
  # doesn't already exist yet. Discovered necessary 2026-07-06 — VERSION
  # moved 0.30 -> 0.31 in commit d36f711, but no v0.31 tag was ever cut,
  # because tagging was a remembered-not-automated manual step (see
  # design.md, openspec/changes/g9-automate-release-tagging or its archived
  # copy, and release-versioning's "Version consistency across all
  # surfaces" requirement).
  #
  # Runs only on direct pushes to main, after build-test has passed on all
  # three OSes (needs:), so a tag only ever marks a commit that has already
  # passed CI. Idempotent by construction (tools/cut_version_tag.py checks
  # for the tag's existence before creating one), so it is safe and cheap
  # to run unconditionally on every push to main rather than gating it
  # behind a separate "did VERSION change" detection job the way
  # commit-native-binaries needs detect-native-changes (that job's rebuild
  # is expensive and non-deterministic across runners; a tag-existence
  # check is neither). Not a required branch-protection status check —
  # there is nothing left to block once a commit is already on main.
  # -----------------------------------------------------------------
  tag-release-version:
    name: Gate G9 — Tag release version
    runs-on: ubuntu-latest
    needs: [build-test]
    permissions:
      contents: write
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    steps:
      - name: Checkout (full history, with write access)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Cut annotated tag matching VERSION, if not already present
        run: python3 tools/cut_version_tag.py
