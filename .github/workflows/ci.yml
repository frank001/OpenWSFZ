name: CI

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      # -----------------------------------------------------------------
      # Cache: NuGet packages and obj/ directories
      # Key is derived from Directory.Packages.props + all .csproj files
      # -----------------------------------------------------------------
      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props', '**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Cache obj/ directories
        uses: actions/cache@v5
        with:
          path: |
            src/**/obj
            tools/**/obj
            tests/**/obj
          key: obj-${{ runner.os }}-${{ hashFiles('Directory.Packages.props', '**/*.csproj') }}
          restore-keys: obj-${{ runner.os }}-

      # -----------------------------------------------------------------
      # macOS: verify committed dylib is current, then rebuild from source.
      # The staleness check runs BEFORE the rebuild so that a developer who
      # bumps FT8_SHIM_VERSION without refreshing the committed binary gets
      # a hard CI failure — not a silent pass against a freshly-rebuilt copy.
      # -----------------------------------------------------------------
      - name: Check committed macOS dylib is current
        if: runner.os == 'macOS'
        continue-on-error: true
        run: |
          EXPECTED=$(python3 -c "import re; src=open('src/OpenWSFZ.Ft8/Interop/Ft8LibInterop.cs').read(); m=re.search(r'ExpectedShimVersion\s*=\s*(\d+)',src); print(m.group(1))")
          echo "C# ExpectedShimVersion = $EXPECTED"
          python3 tools/check_native_version.py \
            src/OpenWSFZ.Ft8/Native/osx-arm64/libft8.dylib "$EXPECTED"

      - name: Build native macOS dylib (ARM64, Clang)
        if: runner.os == 'macOS'
        run: |
          git clone --depth 1 --branch msvc-compat \
            https://github.com/frank001/ft8_lib.git /tmp/ft8_lib
          cd /tmp/ft8_lib
          # Overlay the repo's patched decode.c (adds ftx_compute_candidate_llr_mean_abs
          # and any future non-static diagnostic probes) before compiling.
          cp "$GITHUB_WORKSPACE/native/ft8_lib_build/patched/ft8/decode.c" ft8/decode.c
          clang -std=c11 -D_GNU_SOURCE -O2 -Wall -fPIC -I. \
            -target arm64-apple-macos11.0 -c \
            ft8/constants.c ft8/crc.c ft8/decode.c ft8/encode.c ft8/ldpc.c \
            ft8/message.c ft8/text.c \
            common/monitor.c \
            fft/kiss_fft.c fft/kiss_fftr.c
          clang -std=c11 -D_GNU_SOURCE -O2 -Wall -fPIC -I. \
            -target arm64-apple-macos11.0 -c \
            "$GITHUB_WORKSPACE/src/OpenWSFZ.Ft8/Native/ft8_shim.c"
          clang -dynamiclib -target arm64-apple-macos11.0 \
            -o libft8.dylib \
            constants.o crc.o decode.o encode.o ldpc.o message.o text.o \
            monitor.o kiss_fft.o kiss_fftr.o ft8_shim.o
          echo "=== macOS dylib exports ==="
          nm -gU libft8.dylib | grep "ft8_"
          cp libft8.dylib \
            "$GITHUB_WORKSPACE/src/OpenWSFZ.Ft8/Native/osx-arm64/libft8.dylib"

      - name: Upload macOS dylib artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: libft8-dylib-osx-arm64
          path: src/OpenWSFZ.Ft8/Native/osx-arm64/libft8.dylib
          if-no-files-found: error

      # -----------------------------------------------------------------
      # Linux: verify committed .so is current, then rebuild from source.
      # Mirrors the macOS staleness check above.
      # -----------------------------------------------------------------
      - name: Check committed Linux .so is current
        if: runner.os == 'Linux'
        continue-on-error: true
        run: |
          EXPECTED=$(python3 -c "import re; src=open('src/OpenWSFZ.Ft8/Interop/Ft8LibInterop.cs').read(); m=re.search(r'ExpectedShimVersion\s*=\s*(\d+)',src); print(m.group(1))")
          echo "C# ExpectedShimVersion = $EXPECTED"
          python3 tools/check_native_version.py \
            src/OpenWSFZ.Ft8/Native/linux-x64/libft8.so "$EXPECTED"

      - name: Build native Linux .so (x64, GCC)
        if: runner.os == 'Linux'
        run: |
          git clone --depth 1 --branch msvc-compat \
            https://github.com/frank001/ft8_lib.git /tmp/ft8_lib
          cd /tmp/ft8_lib
          # Overlay the repo's patched decode.c (adds ftx_compute_candidate_llr_mean_abs
          # and any future non-static diagnostic probes) before compiling.
          cp "$GITHUB_WORKSPACE/native/ft8_lib_build/patched/ft8/decode.c" ft8/decode.c
          gcc -std=c11 -D_GNU_SOURCE -O2 -Wall -fPIC -I. -c \
            ft8/constants.c ft8/crc.c ft8/decode.c ft8/encode.c ft8/ldpc.c \
            ft8/message.c ft8/text.c \
            common/monitor.c \
            fft/kiss_fft.c fft/kiss_fftr.c
          gcc -std=c11 -D_GNU_SOURCE -O2 -Wall -fPIC -I. -c \
            "$GITHUB_WORKSPACE/src/OpenWSFZ.Ft8/Native/ft8_shim.c"
          gcc -shared -o libft8.so \
            constants.o crc.o decode.o encode.o ldpc.o message.o text.o \
            monitor.o kiss_fft.o kiss_fftr.o ft8_shim.o \
            -lm
          echo "=== Linux .so exports ==="
          nm -D libft8.so | grep "ft8_"
          cp libft8.so \
            "$GITHUB_WORKSPACE/src/OpenWSFZ.Ft8/Native/linux-x64/libft8.so"

      - name: Upload Linux .so artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: libft8-so-linux-x64
          path: src/OpenWSFZ.Ft8/Native/linux-x64/libft8.so
          if-no-files-found: error

      # -----------------------------------------------------------------
      # Gate G1: Build and test on all three operating systems
      # -----------------------------------------------------------------
      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore

      # -----------------------------------------------------------------
      # AOT publish — must run BEFORE dotnet test so the E2E tests can
      # find the published binary at bin/Release/net10.0/<rid>/publish/.
      # Also exercises the AOT toolchain on each OS (build-pipeline spec).
      # -----------------------------------------------------------------
      - name: AOT publish (Daemon)
        run: >
          dotnet publish src/OpenWSFZ.Daemon
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:PublishAot=true

      # -----------------------------------------------------------------
      # Gate G1: Build-and-test — all matrix legs
      # Gate G6: Decoder-correctness — real-signal fixture integration test
      #          (FR-029 / NFR-016). G6 runs inside the G1 dotnet test step
      #          because the real-signal fixture test lives in
      #          OpenWSFZ.Ft8.Tests. A failing real-signal fixture test
      #          exits non-zero here and blocks merge on all three legs.
      #          The fixture test is expected to be red until the decoder is
      #          fixed in a follow-on change (see RECOVERY_PLAN.md Phase 2).
      # -----------------------------------------------------------------
      - name: Test (Release)
        run: >
          dotnet test -c Release --no-build
          --logger trx
          --collect:"XPlat Code Coverage"
          --results-directory TestResults/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: TestResults/

      # =================================================================
      # Linux-only gates (G3, G5, and coverage reporting)
      # =================================================================

      # -----------------------------------------------------------------
      # Gate G3: TraceabilityCheck
      # -----------------------------------------------------------------
      - name: Gate G3 — Traceability check
        if: runner.os == 'Linux'
        run: >
          dotnet run --project tools/TraceabilityCheck -c Release --no-build --
          --requirements REQUIREMENTS.md
          --assemblies $(find . -path "*/bin/Release/net10.0/*.Tests.dll" | tr '\n' ' ')
          --report traceability.md
          --debt-file traceability-debt.md

      - name: Upload traceability report
        if: runner.os == 'Linux' && always()
        uses: actions/upload-artifact@v7
        with:
          name: traceability-report
          path: traceability.md

      # -----------------------------------------------------------------
      # Gate G5: LicenseInventoryCheck
      # -----------------------------------------------------------------
      - name: Gate G5 — Licence inventory check
        if: runner.os == 'Linux'
        run: >
          dotnet run --project tools/LicenseInventoryCheck -c Release --no-build --
          --solution-root .
          --report licence-inventory.md

      - name: Upload licence inventory report
        if: runner.os == 'Linux' && always()
        uses: actions/upload-artifact@v7
        with:
          name: licence-inventory-report
          path: licence-inventory.md

      # -----------------------------------------------------------------
      # Gate G7: Secrets scan — gitleaks
      # Scans the full commit history for secrets, credentials, private
      # keys, and other sensitive material. Any finding fails the build.
      # Implements: NFR-017 (security — secrets scan gate).
      # -----------------------------------------------------------------
      - name: Gate G7 — Secrets scan (gitleaks)
        if: runner.os == 'Linux'
        run: |
          GITLEAKS_VERSION="8.27.2"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          chmod +x /tmp/gitleaks
          /tmp/gitleaks detect \
            --source . \
            --redact \
            --exit-code 1

      # -----------------------------------------------------------------
      # Coverage reporting (informational only — never fails the workflow)
      # Implements: "Coverage reporting is informational" (ci-quality-gates spec)
      # -----------------------------------------------------------------
      - name: Generate coverage report
        if: runner.os == 'Linux'
        continue-on-error: true
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:"TestResults/**/coverage.cobertura.xml" \
            -targetdir:"coverage-report" \
            -reporttypes:Html

      - name: Upload coverage report
        if: runner.os == 'Linux'
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage-report/

      # -----------------------------------------------------------------
      # Gate G2 (inert placeholder) — Performance gate
      # Becomes a real gate when Phase X lands tests tagged tier=performance.
      # -----------------------------------------------------------------
      - name: Gate G2 — Performance gate (inert until performance tests exist)
        if: runner.os == 'Linux'
        run: |
          # Count tests tagged [Trait("tier", "performance")] — exit 0 when none present.
          # This step becomes a real gate in a later phase.
          echo "Performance gate: no performance tests present — gate passes vacuously."

      # -----------------------------------------------------------------
      # Gate G4 (inert placeholder) — UI-visibility gate
      # Becomes a real gate when Phase X lands tests tagged tier=ui-visibility.
      # -----------------------------------------------------------------
      - name: Gate G4 — UI-visibility gate (inert until UI-visibility tests exist)
        if: runner.os == 'Linux'
        run: |
          # Count tests tagged [Trait("tier", "ui-visibility")] — exit 0 when none present.
          # This step becomes a real gate in a later phase.
          # See UI visibility rule in MEMORY.md: controls only appear once backend is testable.
          echo "UI-visibility gate: no ui-visibility tests present — gate passes vacuously."

  # -----------------------------------------------------------------
  # Commit-back: after the matrix builds fresh Linux and macOS
  # binaries, commit them to the triggering branch so the repo never
  # carries stale binaries.
  #
  # Only runs on direct-push events (not PRs from forks, where write
  # access is unavailable). Skipped when the push was itself made by
  # the GitHub Actions bot (loop guard). The commit message carries
  # [skip ci] so GitHub does not re-trigger the workflow.
  # -----------------------------------------------------------------
  commit-native-binaries:
    name: Commit rebuilt native binaries
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: write
      pull-requests: write
    if: |
      github.event_name == 'push' &&
      github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout (full depth, with write access)
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Linux .so artifact
        uses: actions/download-artifact@v7
        with:
          name: libft8-so-linux-x64
          path: src/OpenWSFZ.Ft8/Native/linux-x64/

      - name: Download macOS dylib artifact
        uses: actions/download-artifact@v7
        with:
          name: libft8-dylib-osx-arm64
          path: src/OpenWSFZ.Ft8/Native/osx-arm64/

      - name: Check whether binaries changed
        id: diff_check
        run: |
          git diff --exit-code \
            src/OpenWSFZ.Ft8/Native/linux-x64/libft8.so \
            src/OpenWSFZ.Ft8/Native/osx-arm64/libft8.dylib \
          && echo "changed=false" >> "$GITHUB_OUTPUT" \
          || echo "changed=true"  >> "$GITHUB_OUTPUT"

      - name: Verify rebuilt binary versions
        if: steps.diff_check.outputs.changed == 'true'
        run: |
          EXPECTED=$(python3 -c "
          import re
          src = open('src/OpenWSFZ.Ft8/Interop/Ft8LibInterop.cs').read()
          m = re.search(r'ExpectedShimVersion\s*=\s*(\d+)', src)
          print(m.group(1))
          ")
          echo "Expected shim version: $EXPECTED"
          python3 tools/check_native_version.py \
            src/OpenWSFZ.Ft8/Native/linux-x64/libft8.so "$EXPECTED"
          python3 tools/check_native_version.py \
            src/OpenWSFZ.Ft8/Native/osx-arm64/libft8.dylib "$EXPECTED"

      - name: Commit updated binaries to PR branch
        if: steps.diff_check.outputs.changed == 'true'
        id: branch_push
        run: |
          SHIM=$(python3 -c "
          import re
          src = open('src/OpenWSFZ.Ft8/Interop/Ft8LibInterop.cs').read()
          m = re.search(r'ExpectedShimVersion\s*=\s*(\d+)', src)
          print(m.group(1))
          ")
          BRANCH="ci/native-binaries-shim${SHIM}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add \
            src/OpenWSFZ.Ft8/Native/linux-x64/libft8.so \
            src/OpenWSFZ.Ft8/Native/osx-arm64/libft8.dylib
          git commit -m "chore(native): rebuild Linux and macOS binaries to shim ${SHIM} [skip ci]"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "shim=$SHIM"     >> "$GITHUB_OUTPUT"

      - name: Open PR for updated binaries
        if: steps.diff_check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.branch_push.outputs.branch }}"
          SHIM="${{ steps.branch_push.outputs.shim }}"
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "PR already open for branch $BRANCH — skipping."
            exit 0
          fi
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(native): update Linux/macOS binaries to shim ${SHIM}" \
            --body "Automated PR from the \`commit-native-binaries\` CI job.

          The Linux (\`libft8.so\`) and macOS (\`libft8.dylib\`) native binaries
          were rebuilt from source and differ from the committed versions.
          This PR updates them to shim ${SHIM}.

          **No source changes.** Safe to merge once CI passes on this branch."
