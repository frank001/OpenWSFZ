name: Build macOS native library (R4 one-shot)

# One-shot workflow — rebuild libft8.dylib on macOS ARM64 for the R4 round
# (adds ft8_get_max_passes export required by R4-2).
# Delete this file after the rebuilt dylib is committed.

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build libft8.dylib (ARM64, Clang)
        run: |
          cd native/ft8_lib
          clang -std=c11 -D_GNU_SOURCE -O2 -Wall -fPIC -I. \
            -target arm64-apple-macos11.0 -c \
            ft8/constants.c ft8/crc.c ft8/decode.c ft8/encode.c ft8/ldpc.c \
            ft8/message.c ft8/text.c \
            common/monitor.c \
            fft/kiss_fft.c fft/kiss_fftr.c
          clang -std=c11 -D_GNU_SOURCE -O2 -Wall -fPIC -I. \
            -target arm64-apple-macos11.0 -c \
            ../../src/OpenWSFZ.Ft8/Native/ft8_shim.c
          clang -dynamiclib -target arm64-apple-macos11.0 \
            -o libft8.dylib \
            constants.o crc.o decode.o encode.o ldpc.o message.o text.o \
            monitor.o kiss_fft.o kiss_fftr.o ft8_shim.o
          echo "=== Verify exports ==="
          nm -gU libft8.dylib | grep "ft8_"
          cp libft8.dylib ../../src/OpenWSFZ.Ft8/Native/osx-arm64/libft8.dylib
          echo "=== Copied to osx-arm64 ==="

      - name: Commit rebuilt dylib
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/OpenWSFZ.Ft8/Native/osx-arm64/libft8.dylib
          git commit -m "chore(ci): rebuild libft8.dylib on macOS ARM64 — R4 ft8_get_max_passes export"
          git push
