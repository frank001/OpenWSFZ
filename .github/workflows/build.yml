name: build

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to keep CI fast.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.preset }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { preset: windows-msvc, runner: windows-latest }
          - { preset: linux-gcc,    runner: ubuntu-latest  }
          - { preset: macos-clang,  runner: macos-latest   }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Linux build deps
        if: matrix.runner == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            libjsoncpp-dev \
            uuid-dev \
            zlib1g-dev

      - name: Install macOS build deps
        if: matrix.runner == 'macos-latest'
        run: |
          brew update
          brew install ninja jsoncpp ossp-uuid

      - name: Setup MSVC dev environment
        if: matrix.runner == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache FetchContent (Drogon + transitive)
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.preset }}/_deps
          key: deps-${{ runner.os }}-drogon-v1.9.13-${{ hashFiles('cmake/Dependencies.cmake') }}
          restore-keys: |
            deps-${{ runner.os }}-drogon-

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} --parallel

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: openwsfz-${{ matrix.preset }}
          path: |
            build/${{ matrix.preset }}/bin/openwsfz*
            build/${{ matrix.preset }}/bin/web/**
          if-no-files-found: error
          retention-days: 14
