<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenWSFZ — Settings</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

  <header id="settings-page">

    <nav class="settings-nav" aria-label="Breadcrumb">
      <a href="/">← Back to main</a>
      <span aria-hidden="true">/</span>
      <span>Settings</span>
    </nav>

    <h1>Settings</h1>

  </header>

  <main id="settings-main">

    <form id="settings-form" novalidate>

      <div class="field-group">
        <label for="device-select">Audio capture device</label>
        <select id="device-select">
          <option disabled>Loading devices…</option>
        </select>
      </div>

      <div class="field-group">
        <label for="port-input">Web UI port</label>
        <input
          id="port-input"
          type="number"
          min="1"
          max="65535"
          placeholder="8080"
        />
      </div>

      <div class="field-group">
        <label class="checkbox-label">
          <input type="checkbox" id="cycle-countdown-toggle" />
          Show cycle countdown (testing aid)
        </label>
        <p class="field-hint">
          Displays a countdown in the status bar to the next 15-second FT8 cycle
          boundary, followed by an 8-second <strong>GO</strong> window — the time
          during which starting a test recording will capture a usable FT8 signal.
        </p>
      </div>

      <div class="form-footer">
        <button id="save-btn" type="button" class="primary">Save</button>
        <p id="feedback" aria-live="polite"></p>
      </div>

    </form>

  </main>

  <script type="module" src="js/settings.js"></script>
</body>
</html>
