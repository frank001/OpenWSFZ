<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenWSFZ</title>
  <style>
    body { background: #1a1a1a; color: #e0e0e0; font-family: monospace; margin: 2rem; }
    h1   { color: #7ec8e3; }
    pre  { background: #111; border: 1px solid #333; padding: 1rem; white-space: pre-wrap; }
    #status { color: #aaa; font-size: 0.85em; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <h1>OpenWSFZ</h1>
  <p id="status">Connecting…</p>
  <pre id="output">(waiting for status)</pre>

  <script>
    const status = document.getElementById('status');
    const output = document.getElementById('output');

    function connect() {
      const ws = new WebSocket(`ws://${location.host}/api/v1/ws`);

      ws.onopen = () => { status.textContent = 'Connected'; };

      ws.onmessage = (ev) => {
        try {
          const msg = JSON.parse(ev.data);
          output.textContent = JSON.stringify(msg, null, 2);
        } catch {
          output.textContent = ev.data;
        }
      };

      ws.onclose = () => {
        status.textContent = 'Disconnected — retrying in 3 s…';
        setTimeout(connect, 3000);
      };

      ws.onerror = () => {
        status.textContent = 'Connection error';
        ws.close();
      };
    }

    connect();
  </script>
</body>
</html>
