<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenWSFZ</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

  <!-- Status bar -->
  <header id="status-bar">
    <span class="app-name">OpenWSFZ</span>

    <span id="ws-state" class="connecting" title="WebSocket connection state">Connecting…</span>

    <span id="audio-device" title="Active audio device">(no device)</span>

    <span id="audio-indicator" class="audio-inactive" title="Audio activity — lit when samples above the noise floor were received in the last 5 seconds">
      <span class="audio-indicator-dot" aria-hidden="true"></span>
      <span class="audio-indicator-label">Audio</span>
    </span>

    <span id="dial-freq" title="Effective dial frequency (CAT live value or configured value)">0.000 MHz</span>

    <span id="cat-badge" hidden title="CAT rig connection state"></span>

    <span id="decode-badge" class="decoding-active" title="FT8 decode pipeline state">Decoding</span>

    <button id="decode-toggle" type="button" title="Start or stop the FT8 decode pipeline">Stop Decoding</button>

    <span id="cycle-timer" title="Seconds remaining in current 15-second FT8 cycle (testing aid)">
      <span class="cycle-label">Cycle</span>
      <span id="cycle-display" class="cycle-counting">--</span>
    </span>

    <nav>
      <a href="/settings.html">⚙ Settings</a>
    </nav>
  </header>

  <!-- Main content -->
  <div id="app">

    <!-- Waterfall / spectrogram panel -->
    <section id="waterfall-panel" aria-label="Waterfall display">
      <canvas id="waterfall"></canvas>
    </section>

    <!-- Waterfall cursor controls (Tasks 7.1, 7.2) -->
    <div id="waterfall-controls">
      <span class="freq-readout-label">RX</span>
      <span id="rx-freq-display" class="freq-readout">1500 Hz</span>
      <span class="freq-readout-label">TX</span>
      <span id="tx-freq-display" class="freq-readout">1500 Hz</span>
      <label class="checkbox-label waterfall-hold-label">
        <input type="checkbox" id="hold-tx-freq">
        Hold TX Freq
      </label>
      <span class="freq-readout-hint">Left-click: RX &middot; Right-click: TX &middot; Shift+click: both</span>
    </div>

    <!-- Decoded messages panel -->
    <section id="decodes-panel" aria-label="Decoded FT8 messages">
      <table id="decodes-table">
        <thead>
          <tr>
            <th>Time</th>
            <th>dB</th>
            <th>DT</th>
            <th>Freq</th>
            <th>Message</th>
          </tr>
        </thead>
        <tbody id="decodes-body">
          <tr>
            <td class="td-no-data" colspan="5">No decodes yet — waiting for FT8 signal</td>
          </tr>
        </tbody>
      </table>
    </section>

  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
